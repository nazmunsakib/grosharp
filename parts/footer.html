<!-- wp:group {"tagName":"footer","className":"grosharp-footer","layout":{"type":"default"}} -->
<footer class="wp-block-group grosharp-footer">
<!-- wp:grosharp/cta-band {"align":"full","isGlobal":true} /-->
<!-- wp:html -->
<div class="overflow-hidden rounded-t-[32px] bg-brand-dark">

	<!-- Main footer body -->
	<div class="gs-container">
		<div class="grid grid-cols-1 gap-12 py-20 md:grid-cols-[1fr_auto] md:items-start md:gap-20 md:py-28">

			<!-- Left: brand + divider + tagline + CTA -->
			<div>
				<!-- Large mixed-weight brand name -->
				<p class="gs-footer-brand-name font-heading font-black tracking-[-0.03em] text-white">
					<span>Gro</span><span class="font-light italic">sharp</span><span class="font-black">.</span>
				</p>

				<!-- Divider -->
				<div class="my-8 h-px bg-white/[0.12] md:w-4/5"></div>

				<!-- Tagline + CTA: driven by Settings → CTA/Footer tab -->
<!-- /wp:html -->

<!-- wp:shortcode -->[grosharp_footer_tagline_cta]<!-- /wp:shortcode -->

<!-- wp:html -->
			</div>

			<!-- Right: footer nav menu (rendered by shortcode) -->
<!-- /wp:html -->

<!-- wp:shortcode -->[grosharp_footer_nav]<!-- /wp:shortcode -->

<!-- wp:html -->
		</div><!-- /grid -->
	</div><!-- /gs-container -->

	<!-- Bottom bar -->
	<div class="border-t border-white/[0.07]">
		<div class="gs-container flex flex-col items-center gap-4 py-5 sm:flex-row sm:justify-between">

			<!-- Copyright — dynamic year via shortcode -->
<!-- /wp:html -->

<!-- wp:shortcode -->[grosharp_copyright]<!-- /wp:shortcode -->

<!-- wp:html -->
			<!-- Legal links (rendered by shortcode) -->
<!-- /wp:html -->

<!-- wp:shortcode -->[grosharp_footer_legal]<!-- /wp:shortcode -->

<!-- /wp:html -->

<!-- wp:shortcode -->[grosharp_footer_social]<!-- /wp:shortcode -->

<!-- wp:html -->
		</div><!-- /gs-container in bottom bar -->
	</div><!-- /bottom bar -->

</div><!-- /outer dark rounded wrapper -->
<!-- /wp:html -->
</footer>
<!-- /wp:group -->
